name: Annual Report Fetcher (Yearly Parallel)

on:
  workflow_dispatch:       # 仅手动触发

jobs:
  fetch_year:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 单个任务最长6小时
    strategy:
      matrix:
        year: [2005,2006,2007,2008,2009,2010,2011,2012,2013,2014,2015,2016,2017,2018,2019,2020,2021,2022,2023,2024,2025]
      fail-fast: false     # 某一年失败不影响其他年份

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests aligo

    - name: Run main script for year ${{ matrix.year }}
      env:
        ALIYUN_REFRESH_TOKEN: ${{ secrets.ALIYUN_REFRESH_TOKEN }}
        ALIYUN_FOLDER_ID: ${{ secrets.ALIYUN_FOLDER_ID }}
        TARGET_YEAR: ${{ matrix.year }}
      run: python main.py
