name: Annual Report Fetcher

on:
  schedule:
    # 年报通常集中在每年4月30日前发布，可设置在此期间高频运行
    - cron: '0 20 * * *'   # 北京时间凌晨4点 (UTC 20:00) 每天运行一次
  workflow_dispatch:      # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4   # 原来是@v3
    - uses: actions/setup-python@v5   # 原来是@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
      
    - name: Install dependencies
      run: |
        pip install requests aligo akshare

    - name: Run main script
      env:
        # 从GitHub Secrets中读取敏感信息
        ALIYUN_REFRESH_TOKEN: ${{ secrets.ALIYUN_REFRESH_TOKEN }}
        ALIYUN_FOLDER_ID: ${{ secrets.ALIYUN_FOLDER_ID }}
      run: python main.py
